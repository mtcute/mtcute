name: Run release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      kind:
        description: 'Release kind (major, minor, patch)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
      branch:
        description: 'Branch to release from'
        required: true
        default: 'master'
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
      - if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch != 'master' }}
        run: git checkout ${{ github.event.inputs.branch }}
      - uses: ./.github/actions/init
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.1
      - name: Initialize configs
        env:
          GH_PRIVKEY: ${{ secrets.GH_PRIVKEY }}
        run: |
          git config user.name "mtcute-bot"
          git config user.email mtcute-bot@tei.su

          echo "$GH_PRIVKEY" > /tmp/bot-key
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          echo "Host github.com" >> ~/.ssh/config
          echo "  IdentityFile /tmp/bot-key" >> ~/.ssh/config
          chmod 600 /tmp/bot-key
          git remote add github git@github.com:${{ github.repository }}.git

      - name: Run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # https://github.com/denoland/deno/issues/32150
          unset GITHUB_ACTIONS
          unset ACTIONS_ID_TOKEN_REQUEST_URL

          DRY_RUN=
          KIND="${{ github.event.inputs.kind || 'auto' }}"
          if [ "${{ github.event_name }}" = "push" ]; then DRY_RUN=--dry-run; KIND=patch; fi

          pnpm exec fuman-build release \
            --kind=$KIND \
            $DRY_RUN \
            --with-npm \
            --npm-token=${{ secrets.NPM_TOKEN }} \
            --git-extra-origins=github \
            --with-github-release \
            --github-repo=${{ github.repository }} \
            --github-token=${{ secrets.GH_PAT }}
